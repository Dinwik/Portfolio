<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>CM2 Tools</title>

        <link rel="icon" type="image/svg" href="../../assets/icon.svg">
        <link rel="stylesheet" href="../../assets/style.css">

        <style>
            #info-output {
                text-align: center;
            } 
        </style>
        <script>
            window.location.href = "../../";
        </script>
    </head>
    <body>
        <header class="options">
            <div class="option">
                <a href="../../../"><h2>Home</h2></a>
            </div>
            <div class="option">
                <h1>QR Code generator</h1>
            </div>
            <div class="option">
                <h2 id="last_update"></h2>
            </div>
        </header>
        <main class="container">
            <article class="item">
                
                <a href="../../">
                    Return
                </a>

                <label>Enter message here:</label>
                <textarea id="message" rows="5">Hello, World!</textarea>

                <label>Choose error correction level</label>
                <input type="number" id="errorCorrectionLevel" min="1" max="4" placeholder="1-4" value="2">

                <div class="options">
                    <div class="option">
                        <label>
                            <input type="checkbox" id="forceMinVersion">Force minimal version (size)
                        </label>
                        
                        <input type="number" id="minVersion" min="1" max="40" step="1" disabled placeholder="1-40">
                    </div>

                    <div class="option">
                        <label>
                            <input type="checkbox" id="forceMaskPattern">Force mask pattern
                        </label>

                        <input type="number" id="maskPattern" min="0" max="7" step="1" disabled placeholder="0-7">
                    </div>
                </div>
                <div id="info-output" style="white-space: pre-line;"></div>
                <button onClick="thread()">Generate</button>
            </article>
        </main>
        
        <script src="scripts/input-handler.js"></script>
        <script src="scripts/encoding.js"></script>
        <script src="scripts/main.js"></script>
        <script src="../../assets/misc.js"></script>
    </body>
</html>
