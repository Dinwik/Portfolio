<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>CM2 Circuit generator</title>

        <link rel="icon" type="image/svg" href="../../../assets/icon.svg">
        <link rel="stylesheet" href="../../../assets/style.css">

        <script src="../cm2.js"></script>
        <script src="js/decoder.js"></script>
        <script src="js/rca.js"></script>
        <script src="js/cla.js"></script>
        <script src="js/double-dabble.js"></script>
        <script src="js/counter.js"></script>
    </head>
    <body>
        <header class="options">
            <div class="option">
                <a href="../../../"><h2>Home</h2></a>
            </div>
            <div class="option">
                <h1>CM2 Circuit generator</h1>
            </div>
            <div class="option">
                <h2 id="last_update"></h2>
            </div>
        </header>
        <main class="container">
            <article class="item">
                <a href="../">
                    Return
                </a>

                <label>Bits:<input type="number" id="bits" min="1" max="64" value="4"></label>

                <label>
                    Circuit:
                    <select class="input" id="type">
                        <option value="decoder">Decoder</option>
                        <option value="rca">Ripple Carry Adder</option>
                        <option value="cla">Carry Lookahead Adder</option>
                        <option value="dd">Double dabble</option>
                        <option value="counter">Counter</option>
                    </select>
                </label>

                <button onclick="generate()">Click to copy CM2 string</button>

                <div id="copyfail"></div>
            </article>
        </main>
        <script src="js/input-handler.js"></script>
        <script>
            function generate() {
 
                switch(document.getElementById("type").value) {

                    case "decoder": decoder(bits.value); break;
                    case "cla": cla(bits.value); break;
                    case "dd":
                        if (bits.value < 4) {
                            bits.setCustomValidity("Bits must be greater than 3");
                            bits.reportValidity();
                            return;
                        } else
                            bits.setCustomValidity("");
                        dd(bits.value);
                        break;
                    case "rca": rca(bits.value); break;
                    case "counter": counter(bits.value); break;
                }
            }
        </script>
        <script src="../../../assets/misc.js"></script>
    </body>
</html>
