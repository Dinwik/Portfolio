<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>CM2 Image generator</title>

        <link rel="icon" type="image/svg" href="../../../assets/icon.svg">
        <link rel="stylesheet" href="../../../assets/style.css">

        <script src="../cm2.js"></script>

        <style>
            .option {
                flex-direction: column;
            }
        </style>
    </head>
    <body>
        <header class="options">
            <div class="option">
                <a href="../../../"><h2>Home</h2></a>
            </div>
            <div class="option">
                <h1>CM2 Image generator</h1>
            </div>
            <div class="option">
                <h2 id="last_update"></h2>
            </div>
        </header>
        <main class="container">
            <article class="item">     
                <a href="../">
                    Return
                </a>

                <div class="file_input" id="drop">
                    Drag & drop or click to select file
                    <input type="file" id="file_input" accept="image/*" style="display: none !important;">
                    <canvas id="inputImage" height="0"></canvas>
                </div>

                <div class="options">
                    <div class="option">
                        Max blocks (in thousands):
                        <input type="number" min="10" max="150" value="60" id="max">
                    </div>
                    <div class="option">
                        <label title="Higher number ignores small color differences">
                            Color tolerance:
                            <input type="number" min="1" max="64" value="15" id="tolerance">
                        </label>
                    </div>
                </div>

                <label>
                    <input type="checkbox" id="vertical" checked="true">Vertical
                </label>


                <button onclick="generate()">Click to copy CM2 string</button>

                <div id="reduced">
                    
                </div>

            </article>
        </main>
        <script src="js/input-handler.js"></script>
        <script src="js/generator.js"></script>
        <script src="../../../assets/misc.js"></script>
    </body>
</html>
