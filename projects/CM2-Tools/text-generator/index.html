<!DOCTYPE html>
<html lang="pl">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>CM2 Text generator</title>
        <link rel="icon" type="image/svg" href="../../../assets/icon.svg">
        <link rel="stylesheet" href="../../../assets/style.css">

        <script src="text.js"></script>
    </head>
    <body>
        <header class="options">
            <div class="option">
                <a href="../../../"><h2>Home</h2></a>
            </div>
            <div class="option">
                <h1>CM2 Text generator</h1>
            </div>
            <div class="option">
                <h2 id="last_update"></h2>
            </div>
        </header>
        <main class="container">
            <article class="item">     
                <a href="../">Return</a>

                <textarea rows="15" id="input"></textarea>

                <div class="options">
                    <label title="Disable, if you are planning to move or copy the text in-game later.">
                        <input type="checkbox" id="aligned">Aligned to grid
                    </label>
                    <label>
                        <input type="checkbox" id="auto" checked>Auto new line
                    </label>
                </div>
                <br>

                Color:<input type="color" id="color" value="#194754">

                <button onclick="copyString()">Click to copy CM2 string</button>

                <div id="copyfail"></div>
            </article>
        </main>
        
        <script src="../cm2.js"></script>
        <script>
            const aligned = document.getElementById("aligned");
            const auto = document.getElementById("auto");
            const input = document.getElementById("input");

            function copyString() {

                clear();

                let value = input.value.normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/ł/g, "l").replace(/Ł/g, "L").split("").filter(char => char.charCodeAt(0) <= 127).join("");

                text(value, aligned.checked, auto.checked ? 100 : 0);

                getString()
            }
        </script>
        <script src="../../../assets/misc.js"></script>
    </body>
</html>
