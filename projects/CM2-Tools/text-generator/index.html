<!DOCTYPE html>
<html lang="pl">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>CM2 Text generator</title>
        <link rel="icon" type="image/svg" href="../../../assets/icon.svg">
        <link rel="stylesheet" href="../../../assets/style.css">
    </head>
    <body>
        <header class="options">
            <div class="option">
                <a href="../../../"><h2>Home</h2></a>
            </div>
            <div class="option">
                <h1>CM2 Text generator</h1>
            </div>
            <div class="option">
                <h2 id="last_update"></h2>
            </div>
        </header>
        <main class="container">
            <article class="item">     
                <a href="../">Return</a>

                <textarea rows="15" id="input"></textarea>

                <div class="options">
                    <label title="Disable, if you are planning to move or copy the text in-game later.">
                        <input type="checkbox" id="aligned">Aligned to grid
                    </label>
                    <label>
                        <input type="checkbox" id="auto" checked>Auto new line
                    </label>
                </div>
                <br>

                Color:<input type="color" id="color" value="#194754">

                <button onclick="copyString()">Click to copy CM2 string</button>
            </article>
        </main>
        
        <script src="../cm2.js"></script>
        <script>
            const aligned = document.getElementById("aligned");
            const colorInput = document.getElementById("color");
            const auto = document.getElementById("auto");
            const input = document.getElementById("input");

            aligned.addEventListener("change", () => {
                colorInput.disabled = aligned.checked;
            });

            function copyString() {
                const colorValue = colorInput.value;
                let drawColor = colorValue !== "#194754";
                let r, g, b;

                if (drawColor) {
                    r = parseInt(colorValue.substring(1, 3), 16);
                    g = parseInt(colorValue.substring(3, 5), 16);
                    b = parseInt(colorValue.substring(5, 7), 16);
                }

                clear();

                let text = input.value;

                const move = aligned.checked ? 1 : 0.45;
                let row = 0;
                let col = 0;

                for (let i = 0; i < text.length; i++) {
                    const char = text[i];
                    
                    switch (char) {
                        case "\n":
                            row++;
                            col = 0;
                            break;
                        case "\t":
                            col += 1.8;
                            break;
                        case " ":
                            col++;
                            break;
                        default:
                            add("text", 0, col * move, col * 0.001, row, char);
                            
                            if (drawColor && !colorInput.disabled) {
                                add("tile", 0, col * move - 0.001, (col + 1) * 0.001, row - 0.001, [r, g, b, 2]);
                                add("tile", 0, col * move + 0.001, (col - 1) * 0.001, row + 0.001, [r, g, b, 2]);
                            }
                            col++;
                            break;
                    }
                    
                    if (auto.checked && col > 100) {
                        row++;
                        col = 0;
                    }
                }

                getString()
            }
        </script>
        <script src="../../../assets/misc.js"></script>
    </body>
</html>
